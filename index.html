</head>

<body>

```
<h1>Calculator Trader Assistance</h1>

<div class="container">

    <div class="size">

        <p class="title">Position Size Calculator</p>

        <form>
            <label>Risk Amount ($)</label>
            <input id="risk" type="number" placeholder="30" min="0">

            <label>Stop Loss (Pips)</label>
            <input id="stop" type="number" placeholder="10" min="0">

            <label>Risk Reward (RR)</label>
            <input id="rr" type="number" placeholder="2" min="1" step="0.1">

            <input type="button" onclick="calculateTrade()" value="Calculate">
        </form>

        <p id="sizeResult" class="result"></p>
        <p id="profitAmount" class="result"></p>

    </div>

    <div class="risk">

        <p class="title">Risk Percent</p>

        <form>
            <label>Margin ($)</label>
            <input id="margin" type="number" placeholder="1000" min="0">

            <label>Risk Percent (%)</label>
            <input id="percent" type="number" placeholder="2" min="0">

            <input type="button" onclick="riskManagment()" value="Calculate">
        </form>

        <p id="riskResult" class="result"></p>

    </div>

</div>
```

</body>
</html>
