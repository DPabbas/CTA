<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <h1>Calculator Trader Assistance</h1>

    <div class="container">

        <div class="size">

            <p class="title">Position Size Calculator</p>

            <label>Risk Amount ($)</label>
            <input id="risk" type="number" placeholder="0">

            <label>Stop Loss (Pips)</label>
            <input id="stop" type="number" placeholder="0">

            <label>Risk Reward (RR)</label>
            <input id="rr" type="number" placeholder="2" value="2">

            <input type="button" value="Calculate" onclick="calculateTrade()">

            <p id="sizeResult" class="result"></p>
            <p id="profitResult" class="result"></p>

        </div>

        <div class="risk">

            <p class="title">Risk Percent Calculator</p>

            <label>Account Balance</label>
            <input id="margin" type="number" placeholder="1000">

            <label>Risk Percent</label>
            <input id="percent" type="number" placeholder="2">

            <input type="button" value="Calculate" onclick="riskManagement()">

            <p id="riskResult" class="result"></p>

        </div>

    </div>

</body>
</html>
